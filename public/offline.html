<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Offline — FLIXNET</title>
<style>
  html, body { margin: 0; padding: 0; background: #0f0f0f; color: #e5e5e5; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; height: 100%; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 1rem; }
  .wrap { max-width: 480px; }
  .logo { font-size: 2.5rem; font-weight: 800; letter-spacing: 0.1em; margin-bottom: 1rem; }
  .logo span { color: #e50914; }
  h1 { font-size: 1.5rem; margin: 0.5rem 0; font-weight: 700; }
  p { color: #a0a0a0; line-height: 1.5; margin: 0.5rem 0 1.5rem; font-size: 0.95rem; }
  .icon { display: inline-block; width: 64px; height: 64px; border-radius: 50%; background: rgba(229,9,20,0.15); color: #e50914; line-height: 64px; font-size: 2rem; margin-bottom: 1rem; }
  button { background: #e50914; color: #fff; border: 0; padding: 0.75rem 1.5rem; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.95rem; }
  button:hover { background: #c70812; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="logo">FLIX<span>NET</span></div>
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>We couldn't reach the FLIXNET servers. Check your internet connection and try again. Previously visited pages may still be available.</p>
    <button onclick="location.reload()">Try again</button>
  </div>
</body>
</html>
